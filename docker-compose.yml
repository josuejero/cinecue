services:
  db:
    image: docker.io/imresamu/postgis:18-3.6-bookworm
    container_name: cinecue-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cinecue
      POSTGRES_USER: cinecue
      POSTGRES_PASSWORD: cinecue
    volumes:
      - cinecue_postgres:/var/lib/postgresql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinecue -d cinecue"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: cinecue-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cinecue_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  cinecue_postgres:
  cinecue_redis:
